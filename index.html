<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide scrollbar for a cleaner look in the settings */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111; 
        }
        ::-webkit-scrollbar-thumb {
            background: #333; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden select-none font-sans">

    <!-- Top subtle progress bar -->
    <div class="h-1 bg-gray-900 w-full fixed top-0 left-0 z-10">
        <div id="progressBar" class="h-full bg-[#ff5a50] transition-all duration-150 ease-out" style="width: 0%"></div>
    </div>

    <!-- Main Reading Area -->
    <div id="readingArea" class="h-screen w-full flex flex-col items-center justify-center cursor-pointer relative z-0">
        <div class="relative w-full max-w-5xl h-32 flex items-center justify-center my-12">
            <!-- Horizontal Alignment Lines -->
            <div class="absolute top-0 left-0 w-full border-t border-[#1a1a1a]"></div>
            <div class="absolute bottom-0 left-0 w-full border-b border-[#1a1a1a]"></div>
            
            <!-- Word Container (Fixed Layout) -->
            <div id="wordDisplay" class="w-full flex items-center justify-center text-5xl md:text-7xl font-medium tracking-wide antialiased transition-colors" style="font-family: 'Georgia', serif;">
                <!-- Left side gets exactly 50% minus half the center character -->
                <div class="flex-1 flex justify-end min-w-0">
                    <span id="leftPart" class="whitespace-pre"></span>
                </div>
                <!-- Center character locked in the middle -->
                <div class="flex-none text-[#ff5a50] relative text-center">
                    <span id="orpChar"></span>
                    <!-- Vertical Alignment Notches -->
                    <div class="absolute left-1/2 -top-[calc(4rem)] w-[2px] h-4 bg-[#333] -translate-x-1/2"></div>
                    <div class="absolute left-1/2 -bottom-[calc(4rem)] w-[2px] h-4 bg-[#333] -translate-x-1/2"></div>
                </div>
                <!-- Right side gets exactly 50% minus half the center character -->
                <div class="flex-1 flex justify-start min-w-0">
                    <span id="rightPart" class="whitespace-pre"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Persistent WPM Display -->
    <div id="wpmDisplayPersistent" class="absolute bottom-6 right-8 text-[#4a4a4a] italic text-sm pointer-events-none">
        350 wpm
    </div>

    <!-- Floating Header Controls -->
    <div id="controls" class="absolute top-6 right-8 flex gap-4 transition-opacity duration-300 opacity-100">
        <button id="btnRestart" class="p-2 text-gray-500 hover:text-white transition-colors" title="Restart">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button id="btnPlayPause" class="p-2 text-gray-500 hover:text-white transition-colors" title="Play">
            <!-- Play Icon Default -->
            <svg id="iconPlay" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
            <!-- Pause Icon (Hidden Default) -->
            <svg id="iconPause" class="hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button id="btnSettings" class="p-2 text-gray-500 hover:text-white transition-colors" title="Settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </div>

    <!-- Settings Modal Overlay -->
    <div id="settingsModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 sm:p-8 hidden">
        <div class="bg-[#111] border border-[#222] rounded-xl w-full max-w-2xl flex flex-col shadow-2xl overflow-hidden max-h-[90vh]">
            <div class="flex items-center justify-between p-6 border-b border-[#222]">
                <h2 class="text-xl font-semibold text-gray-200">Settings</h2>
                <button id="btnCloseSettings" class="text-gray-500 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <div class="p-6 overflow-y-auto space-y-8 flex-1">
                <!-- Text Input Area -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-400">Content to Read</label>
                    <textarea id="textInput" class="w-full h-40 bg-black border border-[#333] rounded-lg p-4 text-gray-300 focus:outline-none focus:border-[#ff5a50] resize-none" placeholder="Paste your text here..."></textarea>
                    <div class="text-xs text-gray-600 flex justify-end" id="wordCountDisplay">
                        0 words total
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- WPM Slider -->
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <label class="text-sm font-medium text-gray-400">Reading Speed</label>
                            <span id="wpmDisplaySettings" class="text-[#ff5a50] font-bold">350 WPM</span>
                        </div>
                        <input id="wpmSlider" type="range" min="100" max="1000" step="10" value="350" class="w-full accent-[#ff5a50]" />
                    </div>

                    <!-- Font Selector -->
                    <div class="space-y-4">
                        <label class="text-sm font-medium text-gray-400">Typography</label>
                        <select id="fontSelect" class="w-full bg-black border border-[#333] rounded-lg p-3 text-gray-300 focus:outline-none focus:border-[#ff5a50]">
                            <optgroup label="Default Fonts">
                                <option value="Georgia, serif">Georgia (Serif)</option>
                                <option value="'Times New Roman', serif">Times New Roman</option>
                                <option value="Arial, sans-serif">Arial (Sans)</option>
                                <option value="system-ui, sans-serif">System UI</option>
                                <option value="monospace">Monospace</option>
                            </optgroup>
                            <optgroup id="customFontsGroup" label="Custom Fonts" style="display: none;">
                            </optgroup>
                        </select>

                        <div class="relative">
                            <input id="fontUpload" type="file" accept=".ttf,.otf,.woff,.woff2" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            <div class="w-full flex items-center justify-center gap-2 bg-[#1a1a1a] hover:bg-[#222] border border-[#333] rounded-lg p-3 text-gray-300 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                <span class="text-sm">Upload Font File</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        const DEFAULT_TEXT = `Welcome to your minimalist speed reader. This tool uses Rapid Serial Visual Presentation (RSVP) to help you read faster. By aligning the Optimal Recognition Point (ORP) of each word to a fixed red focal point, your eyes don't have to scan across the page. This eliminates saccades and allows you to absorb information at incredibly high speeds. To start or pause, simply click anywhere on the reading area or press the Spacebar. You can use the left and right arrow keys to step backwards and forwards. Open the settings menu to paste your own text, adjust the reading speed, or upload a custom font file.`;
        
        let words = [];
        let currentIndex = 0;
        let isPlaying = false;
        let wpm = 350;
        let timeoutId = null;

        // DOM Elements
        const textInput = document.getElementById('textInput');
        const readingArea = document.getElementById('readingArea');
        const leftPartEl = document.getElementById('leftPart');
        const orpCharEl = document.getElementById('orpChar');
        const rightPartEl = document.getElementById('rightPart');
        const progressBar = document.getElementById('progressBar');
        const wordCountDisplay = document.getElementById('wordCountDisplay');
        const wpmDisplayPersistent = document.getElementById('wpmDisplayPersistent');
        const wpmDisplaySettings = document.getElementById('wpmDisplaySettings');
        const wpmSlider = document.getElementById('wpmSlider');
        const controls = document.getElementById('controls');
        const wordDisplay = document.getElementById('wordDisplay');
        const fontSelect = document.getElementById('fontSelect');
        const fontUpload = document.getElementById('fontUpload');
        const customFontsGroup = document.getElementById('customFontsGroup');

        // Buttons
        const btnPlayPause = document.getElementById('btnPlayPause');
        const btnRestart = document.getElementById('btnRestart');
        const btnSettings = document.getElementById('btnSettings');
        const btnCloseSettings = document.getElementById('btnCloseSettings');
        const settingsModal = document.getElementById('settingsModal');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');

        // Initialization
        function init() {
            textInput.value = DEFAULT_TEXT;
            parseText();
            renderWord();
            setupEventListeners();
        }

        // Core Logic
        function parseText() {
            const text = textInput.value;
            words = text.trim().split(/\s+/).filter(w => w.length > 0);
            currentIndex = 0;
            isPlaying = false;
            updateUI();
            wordCountDisplay.textContent = `${words.length} words total`;
        }

        function getORPIndex(word) {
            const len = word.length;
            const orpMap = [0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3, 3, 4, 4];
            return len < orpMap.length ? orpMap[len] : 4;
        }

        function renderWord() {
            if (words.length === 0) {
                leftPartEl.textContent = '';
                orpCharEl.textContent = '';
                rightPartEl.textContent = '';
                return;
            }

            const word = words[currentIndex] || "";
            const orpIndex = getORPIndex(word);
            
            leftPartEl.textContent = word.substring(0, orpIndex);
            orpCharEl.textContent = word.charAt(orpIndex);
            rightPartEl.textContent = word.substring(orpIndex + 1);

            updateProgress();
        }

        function updateProgress() {
            const progress = words.length > 1 ? (currentIndex / (words.length - 1)) * 100 : 0;
            progressBar.style.width = `${progress}%`;
        }

        function togglePlay() {
            if (currentIndex >= words.length - 1 && !isPlaying) {
                currentIndex = 0;
            }
            isPlaying = !isPlaying;
            updateUI();
            
            if (isPlaying) {
                playLoop();
            } else {
                clearTimeout(timeoutId);
            }
        }

        function playLoop() {
            if (!isPlaying || currentIndex >= words.length) {
                isPlaying = false;
                updateUI();
                return;
            }

            const currentWord = words[currentIndex];
            const baseDelay = 60000 / wpm;
            let multiplier = 1;
            
            if (/[.!?]$/.test(currentWord)) {
                multiplier = 2.0;
            } else if (/[,;:]$/.test(currentWord)) {
                multiplier = 1.5;
            } else if (currentWord.length > 10) {
                multiplier = 1.2;
            }

            renderWord();

            timeoutId = setTimeout(() => {
                currentIndex++;
                if (currentIndex >= words.length) {
                    isPlaying = false;
                    currentIndex = words.length - 1; // Keep at the end
                    renderWord();
                    updateUI();
                } else {
                    playLoop();
                }
            }, baseDelay * multiplier);
        }

        function updateUI() {
            // Update Icons
            if (isPlaying) {
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                controls.classList.add('opacity-0');
                controls.classList.remove('opacity-100');
            } else {
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
                controls.classList.remove('opacity-0');
                controls.classList.add('opacity-100');
            }
        }

        // Font Handling
        async function handleFontUploadAsync(e) {
            const file = e.target.files[0];
            if (!file) return;

            const fontName = `Custom_${file.name.split('.')[0]}_${Date.now()}`;
            const fontUrl = URL.createObjectURL(file);
            const fontFace = new FontFace(fontName, `url(${fontUrl})`);

            try {
                const loadedFont = await fontFace.load();
                document.fonts.add(loadedFont);
                
                customFontsGroup.style.display = 'block';
                const option = document.createElement('option');
                option.value = fontName;
                option.textContent = file.name;
                customFontsGroup.appendChild(option);
                
                fontSelect.value = fontName;
                wordDisplay.style.fontFamily = fontName;
            } catch (error) {
                console.error("Failed to load font", error);
                alert("Failed to load custom font.");
            }
        }

        // Event Listeners
        function setupEventListeners() {
            readingArea.addEventListener('click', togglePlay);
            
            btnPlayPause.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePlay();
            });

            btnRestart.addEventListener('click', (e) => {
                e.stopPropagation();
                currentIndex = 0;
                isPlaying = false;
                clearTimeout(timeoutId);
                renderWord();
                updateUI();
            });

            btnSettings.addEventListener('click', (e) => {
                e.stopPropagation();
                isPlaying = false;
                clearTimeout(timeoutId);
                updateUI();
                settingsModal.classList.remove('hidden');
            });

            btnCloseSettings.addEventListener('click', () => {
                settingsModal.classList.add('hidden');
                parseText();
                renderWord();
            });

            textInput.addEventListener('input', () => {
                const text = textInput.value;
                const tempWords = text.trim().split(/\s+/).filter(w => w.length > 0);
                wordCountDisplay.textContent = `${tempWords.length} words total`;
            });

            wpmSlider.addEventListener('input', (e) => {
                wpm = Number(e.target.value);
                wpmDisplayPersistent.textContent = `${wpm} wpm`;
                wpmDisplaySettings.textContent = `${wpm} WPM`;
            });

            fontSelect.addEventListener('change', (e) => {
                wordDisplay.style.fontFamily = e.target.value;
            });

            fontUpload.addEventListener('change', handleFontUploadAsync);

            // Keyboard Shortcuts
            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;

                if (e.code === 'Space') {
                    e.preventDefault();
                    togglePlay();
                } else if (e.code === 'ArrowLeft') {
                    e.preventDefault();
                    isPlaying = false;
                    clearTimeout(timeoutId);
                    currentIndex = Math.max(0, currentIndex - 1);
                    renderWord();
                    updateUI();
                } else if (e.code === 'ArrowRight') {
                    e.preventDefault();
                    isPlaying = false;
                    clearTimeout(timeoutId);
                    currentIndex = Math.min(words.length - 1, currentIndex + 1);
                    renderWord();
                    updateUI();
                }
            });
        }

        // Run
        init();

    </script>
</body>
</html>
